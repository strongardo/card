    <rect x="94" y="27" width="72" height="26" rx="5" fill="rgba(234,88,12,.3)"/>
    <rect x="94" y="44" width="72" height="9" fill="rgba(234,88,12,.3)"/>
    <rect x="101" y="62" width="58" height="4" rx="2" fill="rgba(255,255,255,.12)"/>
    <rect x="101" y="62" width="42" height="4" rx="2" fill="#22C55E"/>
    <rect x="101" y="70" width="46" height="4" rx="2" fill="rgba(255,255,255,.38)"/>
    <!-- Course card 2 (Python) -->
    <rect x="174" y="27" width="72" height="58" rx="5" fill="rgba(255,255,255,.06)" stroke="rgba(34,197,94,.18)" stroke-width="1"/>
    <rect x="174" y="27" width="72" height="26" rx="5" fill="rgba(37,99,235,.35)"/>
    <rect x="174" y="44" width="72" height="9" fill="rgba(37,99,235,.35)"/>
    <rect x="181" y="62" width="58" height="4" rx="2" fill="rgba(255,255,255,.12)"/>
