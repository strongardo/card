<svg width="260" height="160" viewBox="0 0 260 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="ckbg" x1="0" y1="0" x2="260" y2="160" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#052E16"/>
            <stop offset="100%" stop-color="#064E3B"/>
        </linearGradient>
    </defs>
    <rect width="260" height="160" fill="url(#ckbg)"/>
    <!-- Left: student profile -->
    <rect width="86" height="160" fill="rgba(0,0,0,.22)"/>
    <!-- Progress ring track -->
    <circle cx="43" cy="48" r="28" stroke="rgba(34,197,94,.15)" stroke-width="5"/>
