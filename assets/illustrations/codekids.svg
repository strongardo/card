    <path d="M43 20 A28 28 0 1 1 16.8 52" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
    <!-- Avatar -->
    <circle cx="43" cy="48" r="18" fill="#166534"/>
    <circle cx="43" cy="43" r="7" fill="#22C55E" opacity=".65"/>
    <ellipse cx="43" cy="59" rx="12" ry="6" fill="#22C55E" opacity=".35"/>
